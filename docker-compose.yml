services:
  # ---- MongoDB ----
  mongodb:
    image: mongo:7
    container_name: mahindra-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # ---- Backend (Express API) ----
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mahindra-server
    ports:
      - "5011:5011"
    depends_on:
      mongodb:
        condition: service_started
    environment:
      - PORT=5011
      - MONGODB_URI=mongodb://mongodb:27017/mahindra-builder
      - CLIENT_URL=http://100.124.197.109,http://100.124.197.109:7001
      - NODE_ENV=development
      - JWT_SECRET=mahindra_secret_123
      - SALESFORCE_URL=https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8
      - SALESFORCE_ORG_ID=00D4x000007sh6p
      - SALESFORCE_RECORD_TYPE=012Vt0000023hFO
      - SALESFORCE_DEBUG_EMAIL=amin.noumita@mahindralogistics.com
      - SALESFORCE_DEBUG=0
    volumes:
      - uploads-data:/app/public/uploads
    restart: unless-stopped

  # ---- Frontend (Vite + React) ----
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: mahindra-client
    ports:
      - "7001:7001"
    depends_on:
      - server
    environment:
      - VITE_HOST=0.0.0.0
      - VITE_HMR_HOST=100.124.197.109
      - VITE_HMR_PORT=7001
      - VITE_HMR_PROTOCOL=http
      - VITE_API_URL=http://100.124.197.109:5011/api
    restart: unless-stopped

volumes:
  mongo-data:
  uploads-data:
